<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAVARA · Dashboard</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="stylesheet" href="/css/admin.css" />
  <style>
    .section-title-sm {
      font-family: var(--serif);
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="admin-dashboard">
    <header class="admin-topbar">
      <div class="admin-topbar-inner">
        <span class="admin-topbar-brand">
          <span class="logo-main small">SAVARA</span>
          <span class="admin-topbar-label">Admin</span>
        </span>
        <div class="admin-topbar-actions">
          <a href="/index.html" class="admin-link" target="_blank">Ver tienda</a>
          <button class="admin-btn-logout" id="btn-logout">Cerrar sesión</button>
        </div>
      </div>
    </header>

    <nav class="admin-tabs">
      <a href="/admin/dashboard.html" class="admin-tab activo">Dashboard</a>
      <a href="/admin/productos.html" class="admin-tab">Productos</a>
      <a href="/admin/tienda.html" class="admin-tab">Tienda</a>
    </nav>

    <div style="display:flex;justify-content:flex-end;padding:12px 40px 0;">
      <a href="/admin/cambiar-pass.html" class="admin-link" style="font-size:13px;">Cambiar contraseña</a>
    </div>

    <section class="admin-section">
      <div class="admin-section-head">
        <h2>Dashboard</h2>
      </div>

      <p class="admin-greeting" id="admin-greeting"></p>

      <div class="dashboard-cards" id="d-cards">
        <div class="d-card">
          <span class="d-card-icon">📦</span>
          <div class="d-card-num">--</div>
          <div class="d-card-label">Productos</div>
        </div>
        <div class="d-card warn">
          <span class="d-card-icon">⚠️</span>
          <div class="d-card-num">--</div>
          <div class="d-card-label">Stock Bajo</div>
        </div>
        <div class="d-card danger">
          <span class="d-card-icon">✕</span>
          <div class="d-card-num">--</div>
          <div class="d-card-label">Agotados</div>
        </div>
        <div class="d-card brand">
          <span class="d-card-icon">🏷️</span>
          <div class="d-card-num">--</div>
          <div class="d-card-label">Categorías</div>
        </div>
      </div>

      <div class="quick-actions">
        <a href="/admin/producto.html" class="btn-primary btn-icon">+ AGREGAR PRODUCTO</a>
        <a href="/admin/tienda.html" class="btn-ghost btn-icon">⚙ CONFIGURAR TIENDA</a>
        <a href="/index.html" class="btn-ghost btn-icon" target="_blank">👁 VER TIENDA</a>
      </div>

      <div class="cat-chart" id="cat-chart">
        <h3>Productos por Categoría</h3>
        <div id="cat-chart-bars">
          <div class="skeleton skeleton-line" style="width:80%;"></div>
          <div class="skeleton skeleton-line" style="width:65%;"></div>
          <div class="skeleton skeleton-line" style="width:90%;"></div>
        </div>
      </div>

      <h3 class="section-title-sm">Actividad reciente</h3>
      <div class="actividad-lista" id="actividad-lista">
        <div class="actividad-item" style="justify-content:center;color:var(--tinta-suave);">
          <span class="skeleton skeleton-line" style="width:60%;margin:0;"></span>
        </div>
      </div>
    </section>
  </div>

  <div class="toast" id="toast-admin" aria-live="polite"></div>
  <div class="modal-overlay" id="confirm-modal" aria-hidden="true">
    <div class="modal-card" style="max-width:420px;" role="dialog" aria-modal="true">
      <div class="modal-detalle" style="padding:40px 36px;text-align:center;">
        <h3 id="confirm-titulo" style="font-family:var(--serif);font-size:26px;font-weight:500;margin-bottom:12px;">Confirmar</h3>
        <p id="confirm-mensaje" style="color:var(--tinta-suave);margin-bottom:24px;">¿Estás seguro?</p>
        <div style="display:flex;gap:12px;justify-content:center;">
          <button class="btn-ghost" data-confirm="cancelar">Cancelar</button>
          <button class="btn-primary" data-confirm="aceptar">Aceptar</button>
        </div>
      </div>
    </div>
  </div>
  <script src="/js/data.js"></script>
  <script src="/js/admin-common.js"></script>
  <script src="/js/admin-dashboard.js"></script>
</body>
</html>
