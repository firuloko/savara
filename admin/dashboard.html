<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAVARA · Dashboard</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="stylesheet" href="/css/admin.css" />
  <style>
    .dashboard-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    .d-card {
      background: #fff;
      border: 1px solid var(--linea);
      padding: 28px 24px;
      text-align: center;
    }
    .d-card-num {
      font-family: var(--serif);
      font-size: 44px;
      font-weight: 500;
      color: var(--tinta);
      line-height: 1;
    }
    .d-card-label {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--tinta-suave);
      margin-top: 8px;
    }
    .d-card.danger .d-card-num { color: var(--rojo); }
    .d-card.warn .d-card-num   { color: var(--ambar); }
    .d-card.ok .d-card-num     { color: var(--verde); }
    .actividad-lista {
      background: #fff;
      border: 1px solid var(--linea);
    }
    .actividad-item {
      display: flex;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid var(--hueso);
      font-size: 13px;
    }
    .actividad-item:last-child { border-bottom: none; }
    .actividad-accion {
      font-weight: 500;
      color: var(--tinta);
    }
    .actividad-fecha {
      color: var(--tinta-suave);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="admin-dashboard">
    <header class="admin-topbar">
      <div class="admin-topbar-inner">
        <span class="admin-topbar-brand">
          <span class="logo-main small">SAVARA</span>
          <span class="admin-topbar-label">Admin</span>
        </span>
        <div class="admin-topbar-actions">
          <a href="/index.html" class="admin-link" target="_blank">Ver tienda</a>
          <button class="admin-btn-logout" id="btn-logout">Cerrar sesión</button>
        </div>
      </div>
    </header>

    <nav class="admin-tabs">
      <a href="/admin/dashboard.html" class="admin-tab activo">Dashboard</a>
      <a href="/admin/productos.html" class="admin-tab">Productos</a>
      <a href="/admin/tienda.html" class="admin-tab">Tienda</a>
    </nav>

    <div style="display:flex;justify-content:flex-end;padding:12px 40px 0;">
      <a href="/admin/cambiar-pass.html" class="admin-link" style="font-size:13px;">Cambiar contraseña</a>
    </div>

    <section class="admin-section">
      <div class="admin-section-head">
        <h2>Dashboard</h2>
      </div>

      <div class="dashboard-cards" id="d-cards">
        <div class="d-card"><div class="d-card-num">--</div><div class="d-card-label">Productos</div></div>
        <div class="d-card warn"><div class="d-card-num">--</div><div class="d-card-label">Stock Bajo</div></div>
        <div class="d-card danger"><div class="d-card-num">--</div><div class="d-card-label">Agotados</div></div>
        <div class="d-card"><div class="d-card-num">--</div><div class="d-card-label">Categorías</div></div>
      </div>

      <h3 style="font-family:var(--serif);font-size:24px;font-weight:500;margin-bottom:16px;">Actividad reciente</h3>
      <div class="actividad-lista" id="actividad-lista">
        <div class="actividad-item" style="justify-content:center;color:var(--tinta-suave);">Cargando...</div>
      </div>
    </section>
  </div>

  <div class="toast" id="toast-admin" aria-live="polite"></div>
  <div class="modal-overlay" id="confirm-modal" aria-hidden="true">
    <div class="modal-card" style="max-width:420px;" role="dialog" aria-modal="true">
      <div class="modal-detalle" style="padding:40px 36px;text-align:center;">
        <h3 id="confirm-titulo" style="font-family:var(--serif);font-size:26px;font-weight:500;margin-bottom:12px;">Confirmar</h3>
        <p id="confirm-mensaje" style="color:var(--tinta-suave);margin-bottom:24px;">¿Estás seguro?</p>
        <div style="display:flex;gap:12px;justify-content:center;">
          <button class="btn-ghost" data-confirm="cancelar">Cancelar</button>
          <button class="btn-primary" data-confirm="aceptar">Aceptar</button>
        </div>
      </div>
    </div>
  </div>
  <script src="/js/data.js"></script>
  <script src="/js/admin-common.js"></script>
  <script src="/js/admin-dashboard.js"></script>
</body>
</html>
