<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAVARA · Configuración</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="stylesheet" href="/css/admin.css" />
  <style>
    .config-section {
      border: 1px solid var(--linea);
      background: #fff;
      padding: 32px 36px;
      margin-bottom: 28px;
    }
    .config-section h3 {
      font-family: var(--serif);
      font-size: 24px;
      font-weight: 500;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--hueso);
    }
    .color-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
    }
    .color-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .color-item label {
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--tinta-suave);
    }
    .color-item input[type="color"] {
      width: 100%;
      height: 44px;
      padding: 2px;
      border: 1px solid var(--linea);
      cursor: pointer;
      background: none;
    }
  </style>
</head>
<body>
  <div class="admin-dashboard">
    <header class="admin-topbar">
      <div class="admin-topbar-inner">
        <span class="admin-topbar-brand">
          <span class="logo-main small">SAVARA</span>
          <span class="admin-topbar-label">Admin</span>
        </span>
        <div class="admin-topbar-actions">
          <a href="/index.html" class="admin-link" target="_blank">Ver tienda</a>
          <button class="admin-btn-logout" id="btn-logout">Cerrar sesión</button>
        </div>
      </div>
    </header>

    <nav class="admin-tabs">
      <a href="/admin/dashboard.html" class="admin-tab">Dashboard</a>
      <a href="/admin/productos.html" class="admin-tab">Productos</a>
      <a href="/admin/tienda.html" class="admin-tab activo">Configuración</a>
    </nav>

    <section class="admin-section">
      <div class="admin-section-head">
        <h2>Configuración</h2>
      </div>

      <!-- ========= SECCIÓN 1: TIENDA ========= -->
      <div class="config-section">
        <h3>Información de la Tienda</h3>
        <form id="form-tienda" class="admin-form" style="max-width:100%;border:none;padding:0;">
          <div class="admin-field">
            <label for="tienda-nombre">Nombre de tienda</label>
            <input type="text" id="tienda-nombre" required />
          </div>
          <div class="admin-field">
            <label for="tienda-direccion">Dirección</label>
            <input type="text" id="tienda-direccion" required />
          </div>
          <div class="admin-field">
            <label for="tienda-horario">Horario</label>
            <input type="text" id="tienda-horario" required />
          </div>
          <div class="admin-field">
            <label for="tienda-telefono">Teléfono</label>
            <input type="text" id="tienda-telefono" required />
          </div>
          <div class="admin-form-actions" style="padding:0;">
            <button type="submit" class="btn-primary">GUARDAR TIENDA</button>
          </div>
        </form>
      </div>

      <!-- ========= SECCIÓN 2: PÁGINA PRINCIPAL ========= -->
      <div class="config-section">
        <h3>Página Principal</h3>
        <div style="display:grid;gap:20px;max-width:640px;">
          <div class="admin-field">
            <label for="p-hero-eyebrow">Hero — Eyebrow</label>
            <input type="text" id="p-hero-eyebrow" />
          </div>
          <div class="admin-field">
            <label for="p-hero-titulo">Hero — Título</label>
            <input type="text" id="p-hero-titulo" />
          </div>
          <div class="admin-field">
            <label for="p-hero-subtitulo">Hero — Subtítulo</label>
            <textarea id="p-hero-subtitulo" rows="2"></textarea>
          </div>
          <div class="admin-field">
            <label for="p-hero-cta">Hero — Texto del botón</label>
            <input type="text" id="p-hero-cta" />
          </div>
          <div class="admin-field">
            <label for="p-hero-nota">Hero — Nota inferior</label>
            <input type="text" id="p-hero-nota" />
          </div>
          <hr style="border:none;border-top:1px solid var(--hueso);margin:4px 0;" />
          <div class="admin-field">
            <label for="p-seccion-titulo">Sección Tienda — Título</label>
            <input type="text" id="p-seccion-titulo" />
          </div>
          <div class="admin-field">
            <label for="p-seccion-texto">Sección Tienda — Texto</label>
            <textarea id="p-seccion-texto" rows="2"></textarea>
          </div>
          <hr style="border:none;border-top:1px solid var(--hueso);margin:4px 0;" />
          <div class="admin-field">
            <label for="p-footer-desc">Footer — Descripción</label>
            <input type="text" id="p-footer-desc" />
          </div>
          <div class="admin-field">
            <label for="p-footer-copyright">Footer — Copyright</label>
            <input type="text" id="p-footer-copyright" />
          </div>
          <div class="admin-form-actions" style="padding:0;">
            <button class="btn-primary" id="btn-guardar-pagina">GUARDAR PÁGINA</button>
          </div>
        </div>
      </div>

      <!-- ========= SECCIÓN 3: COLORES ========= -->
      <div class="config-section">
        <h3>Colores del Tema</h3>
        <p style="color:var(--tinta-suave);font-size:13px;margin-bottom:20px;">Los cambios se aplican en vivo en la tienda al recargar la página.</p>
        <div class="color-grid" id="color-grid">
          <div class="color-item">
            <label>Dorado (acento)</label>
            <input type="color" class="p-color" data-clave="color_dorado" />
          </div>
          <div class="color-item">
            <label>Dorado claro</label>
            <input type="color" class="p-color" data-clave="color_dorado_claro" />
          </div>
          <div class="color-item">
            <label>Marfil (fondo)</label>
            <input type="color" class="p-color" data-clave="color_marfil" />
          </div>
          <div class="color-item">
            <label>Hueso</label>
            <input type="color" class="p-color" data-clave="color_hueso" />
          </div>
          <div class="color-item">
            <label>Tinta (texto)</label>
            <input type="color" class="p-color" data-clave="color_tinta" />
          </div>
          <div class="color-item">
            <label>Tinta suave</label>
            <input type="color" class="p-color" data-clave="color_tinta_suave" />
          </div>
          <div class="color-item">
            <label>Línea (bordes)</label>
            <input type="color" class="p-color" data-clave="color_linea" />
          </div>
        </div>
        <div class="admin-form-actions" style="padding:0;margin-top:20px;">
          <button class="btn-primary" id="btn-guardar-colores">GUARDAR COLORES</button>
        </div>
      </div>

      <!-- ========= SECCIÓN 4: REDES SOCIALES ========= -->
      <div class="config-section">
        <h3>Redes Sociales</h3>
        <div style="display:grid;gap:20px;max-width:480px;">
          <div class="admin-field">
            <label for="rs-instagram">Instagram (URL completa)</label>
            <input type="text" id="rs-instagram" placeholder="https://instagram.com/savara" />
          </div>
          <div class="admin-field">
            <label for="rs-facebook">Facebook (URL completa)</label>
            <input type="text" id="rs-facebook" placeholder="https://facebook.com/savara" />
          </div>
          <div class="admin-field">
            <label for="rs-tiktok">TikTok (URL completa)</label>
            <input type="text" id="rs-tiktok" placeholder="https://tiktok.com/@savara" />
          </div>
          <div class="admin-field">
            <label for="rs-whatsapp">WhatsApp (URL completa)</label>
            <input type="text" id="rs-whatsapp" placeholder="https://wa.me/56912345678" />
          </div>
          <div class="admin-form-actions" style="padding:0;">
            <button class="btn-primary" id="btn-guardar-redes">GUARDAR REDES</button>
          </div>
        </div>
      </div>
    </section>
  </div>

  <div class="toast" id="toast-admin" aria-live="polite"></div>

  <div class="modal-overlay" id="confirm-modal" aria-hidden="true">
    <div class="modal-card" style="max-width:420px;" role="dialog" aria-modal="true">
      <div class="modal-detalle" style="padding:40px 36px;text-align:center;">
        <h3 id="confirm-titulo" style="font-family:var(--serif);font-size:26px;font-weight:500;margin-bottom:12px;">Confirmar</h3>
        <p id="confirm-mensaje" style="color:var(--tinta-suave);margin-bottom:24px;">¿Estás seguro?</p>
        <div style="display:flex;gap:12px;justify-content:center;">
          <button class="btn-ghost" data-confirm="cancelar">Cancelar</button>
          <button class="btn-primary" data-confirm="aceptar">Aceptar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/data.js"></script>
  <script src="/js/admin-common.js"></script>
  <script src="/js/admin-tienda.js"></script>
</body>
</html>
