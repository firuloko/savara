<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAVARA · Producto</title>
  <meta name="description" content="SAVARA — Ficha de producto." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/styles.css" />
  <style id="theme-vars"></style>
  <link rel="stylesheet" href="css/producto.css" />
</head>
<body>

  <div class="producto-topbar">
    <a href="/" class="producto-logo">SAVARA</a>
    <a href="/" class="producto-back">&larr; Volver al catálogo</a>
  </div>

  <section class="producto-page" id="producto-page">
    <div class="producto-inner">
      <div class="producto-grid">
        <div class="producto-visual" id="p-visual"></div>

        <div class="producto-detalle modal-detalle">
          <span class="section-eyebrow" id="p-categoria"></span>
          <h1 class="modal-nombre" id="p-nombre"></h1>
          <p class="modal-descripcion" id="p-descripcion"></p>

          <div class="modal-precio" id="p-precio"></div>

          <div class="selector">
            <span class="selector-label">Color: <em id="p-color-elegido"></em></span>
            <div class="colores" id="p-colores"></div>
          </div>

          <div class="selector">
            <span class="selector-label">Talla:</span>
            <div class="tallas" id="p-tallas"></div>
          </div>

          <div class="disponibilidad" id="p-disponibilidad">
            <div class="disp-head">
              <span class="disp-titulo">DISPONIBILIDAD EN TIENDA LOCAL</span>
              <span class="disp-badge" id="p-disp-badge"></span>
            </div>
            <p class="disp-mensaje" id="p-disp-mensaje"></p>
            <p class="disp-nota">Este catálogo es solo consultivo. La compra se realiza
              de forma <strong>presencial</strong> en la tienda.</p>
          </div>

          <button class="btn-primary full" id="p-btn-reservar">CONSULTAR EN TIENDA</button>
        </div>
      </div>
    </div>
  </section>

  <div class="toast" id="toast" aria-live="polite"></div>

  <footer class="producto-footer">
    <div class="producto-footer-inner">
      <div class="producto-footer-social" id="pf-social">
        <span class="producto-footer-label">SÍGUENOS</span>
        <a class="pf-link" id="pf-instagram" href="#" target="_blank" rel="noopener">Instagram</a>
        <a class="pf-link" id="pf-facebook" href="#" target="_blank" rel="noopener">Facebook</a>
        <a class="pf-link" id="pf-tiktok" href="#" target="_blank" rel="noopener">TikTok</a>
        <a class="pf-link" id="pf-whatsapp" href="#" target="_blank" rel="noopener">WhatsApp</a>
      </div>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/producto.js"></script>
</body>
</html>
